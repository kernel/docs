name: Check Broken Links

on:
  pull_request:
  push:
    branches: [main]

jobs:
  broken-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Mintlify CLI
        run: npm install -g mintlify

      - name: Check for broken links
        run: mint broken-links
